<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="short icon" type="image/png" href="LOGO.png">
</head>
<body>

	<div id="bar">
		<div id="home" style="color: red; font-family: calibri; font-size: 18pt; text-align: center;"><label>HOME</label></div>
		<div id="menu"><a href="menu.html"><label>MENU</label></a></div>
		<div id="about_us"><a href="about_us.html"><label>ABOUT US</label></a></div>
		<div id="contact"><a href="contact_us.html"><label>CONTACT US</label></a></div>
		<div id="sign"><a href="sign_up.html"><label>SIGN UP</label></a></div>
	</div>

	<div id="menu_list">
		<img id="logo" src="images/LOGO.png">
	
		<div id="list">
			<ul>
				<h5>List Item Food:</h5>
				<li style="font-size: 18px;"><label>Burger</label></li>
				<li style="font-size: 18px;"><label>Chicken Biryani</label></li>
				<li style="font-size: 18px;"><label>Cold Drinks</label></li>

				<li style="font-size: 18px;"><label>Kulche</label></li>
			</ul>	
		</div>
	</div>
	
	<div id="menu_img">

		<div class="pizza" style="margin-left: 0.75%;">
			<img src="images/pizza.jpg" alt="Pizza" title="Pizza">
			<div class="pizza-s">
				<h2>Pizza<br><center>Price: $3</center></h2>
			</div>
		</div>

		<div class="burgor" style="margin-left: 0.5%;">
			<img src="images/burgor.jpg" alt="Burger" title="Burger">
			<div class="burgor-s">
				<h2>Burger<br><center>Price: $2</center></h2>
			</div>
		</div>

		<div class="biryani" style="margin-left: 0.5%;">
			<img src="images/biryani.jpg" alt="Biryani" title="Biryani">
			<div class="biryani-s">
				<h2>FBiryani<br><center>Price: $4</center></h2>
			</div>
		</div>

		<div class="sandwich" style="margin-left: 0.75%;">
			<img src="images/sandwich.jpg" alt="Sandwich" title="Sandwich">
			<div class="sandwich-s">
				<h2><center>Sandwich</center><center>Price: $2</center></h2>
			</div>
		</div>

		<div class="cheese" style="margin-left: 0.5%;">
			<img src="images/cheese.jpg" alt="Cheese" title="Cheese">
			<div class="cheese-s">
				<h2><center>Cheese</center><center>Price: $6</center></h2>
			</div>
		</div>

		<div class="ice" style="margin-left: 0.5%;">
			<img src="images/ice.jpg" alt="Ice" title="Ice">
			<div class="ice-s">
				<h2><center>Ice Cream</center><center>Price:$5</center></h2>
			</div>
		</div>
