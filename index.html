<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="short icon" href="images/LOGO.png">
</head>
<body>

	<!-- <div class="backgroundDiv"> -->

		<div id="form">
			<div><img id="logo" src="images/LOGO.png" alt="Logo"></div>
			<div id="welcome"><label>WELCOME</label></div>
			<div id="des"><label>Magna amet aliqua eu ex laboris enim aliquip. Ex mollit tempor ullamco incididunt ad deserunt veniam ex. Quis ad magna in ex duis aliquip excepteur officia.</label></div>
			<div id="order_now">
				<label><u><p style="text-align: center;">ORDER NOW</p></u><br></label>
				Name: <input id="name" type="text" style="background-color: white; border:1px solid black">
				Date: <input type="date" style="background-color: white; border:1px solid black">
				Time: <input type="Time" style="background-color: white; border:1px solid black"><br>
				Event: <select name="Event" style="background-color: goldenrod; border:1px solid black">
					<option>--Choose Event--</option>
					<option value="Birthday" selected="selected">Birthday</option>
					<option value="Reception">Reception</option>
					<option value="Wedding">Wedding</option>
					<option value="Other">Other</option>
				</select></br>
				Payment:<select id="Payement" style="background-color: rgb(223, 25, 25); border:1px solid black">
					<option>50$</option>
					<option>70$</option>
					<option>90$</option>
					<option>100$</option>
				</select>
				</br>
				<div class="submit">
					<button id="s_btn" type="button">SUBMIT</button>
				</div>
			</div>
		</div>

		<div id="bar">
			<div id="home" style="color: red; font-family: calibri; font-size: 18pt; text-align: center;"><label>HOME</label></div>
			<div id="menu"><a href="menu.html"><label>MENU</label></a></div>
			<div id="about_us"><a href="about_us.html"><label>ABOUT US</label></a></div>
			<div id="contact"><a href="contact_us.html"><label>CONTACT US</label></a></div>
			<div id="sign"><a href="sign_up.html"><label>SIGN UP</label></a></div>
		</div>

		<div id="discount_section">
			<h1 style="color: #f02d2d; font-family: calibri; text-align: center; font-size: 28pt; text-transform: uppercase;">Dicount Offer</h1>
			<div id="first_discount">
				<img id="f_pic" src="images/spirit.jpg">
				<div id="over">
					<p id="of">2. Pepsi<br>1. 2 Litre Pepsi<br> 2. Buy 1 get 2 free<br><del>Price: $5</del><br><ins>Only $2</ins></p>
				</div>
			</div>

			<div id="second_discount">
				<img id="s_pic" src="images/coc.jpg">
				<div id="over2">
					<p id="of">2. Coca Cola<br>1. 2 Litre Coco Cola<br> 2. Buy 1 get 2 free<br><del>Price: $5</del><br><ins>Only $2</ins></p>
				</div>
			</div>

		</div>
